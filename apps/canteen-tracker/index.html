<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canteen Tracker — Aether Mini-App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0F0E17;
      color: #FFFFFE;
      min-height: 100vh;
      padding: 24px;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      gap: 16px;
    }

    .loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #1A1A2E;
      border-top: 3px solid #6C63FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .app { display: none; }
    .app.visible { display: block; }

    .header {
      background: linear-gradient(135deg, #6C63FF 0%, #FF6584 100%);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .header .welcome {
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }

    .menu-card {
      background: #1A1A2E;
      border-radius: 12px;
      padding: 16px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .menu-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108, 99, 255, 0.15);
    }

    .menu-card .emoji {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .menu-card .name {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }

    .menu-card .price {
      color: #2CB67D;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .menu-card .wait {
      color: #A7A9BE;
      font-size: 0.8rem;
      margin-top: 4px;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: #A7A9BE;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.8rem;
    }

    .status-bar {
      background: #16213E;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2CB67D;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      font-size: 0.85rem;
      color: #A7A9BE;
    }

    .status-text strong {
      color: #2CB67D;
    }
  </style>
</head>
<body>

  <!-- Loading state -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Connecting to Aether...</p>
  </div>

  <!-- Main app -->
  <div class="app" id="app">
    <div class="header">
      <h1>🍽️ Canteen Tracker</h1>
      <p class="welcome" id="welcome-msg">Welcome!</p>
    </div>

    <div class="status-bar">
      <div class="status-dot"></div>
      <div class="status-text">Canteen is <strong>Open</strong> — Average wait: ~8 min</div>
    </div>

    <p class="section-title">Today's Menu</p>
    <div class="menu-grid" id="menu-grid"></div>
  </div>

  <!-- aether-bridge SDK -->
  <script src="../libs/aether-bridge/aether-bridge.js"></script>
  <script src="app.js"></script>
</body>
</html>
