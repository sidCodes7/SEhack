<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Approval Analytics - Aether</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-low": "#f4f4ef",
                      "on-tertiary-fixed": "#42424f",
                      "on-tertiary-fixed-variant": "#5f5e6c",
                      "secondary-fixed": "#d5e7de",
                      "on-secondary-container": "#45554f",
                      "secondary-fixed-dim": "#c7d9d0",
                      "secondary-dim": "#465750",
                      "surface-bright": "#faf9f5",
                      "on-secondary": "#ebfdf4",
                      "on-error-container": "#6e0a12",
                      "on-tertiary": "#fbf7ff",
                      "surface": "#faf9f5",
                      "tertiary-container": "#e9e6f7",
                      "on-primary-container": "#525151",
                      "outline-variant": "#b0b3ad",
                      "background": "#faf9f5",
                      "error-dim": "#67040d",
                      "on-surface-variant": "#5d605b",
                      "inverse-on-surface": "#9d9d9a",
                      "primary": "#605f5f",
                      "surface-dim": "#d9dbd4",
                      "tertiary-fixed-dim": "#dbd8e9",
                      "secondary-container": "#d5e7de",
                      "surface-container-highest": "#e1e3dd",
                      "on-background": "#30332f",
                      "on-surface": "#30332f",
                      "inverse-primary": "#ffffff",
                      "on-primary-fixed": "#403f3f",
                      "tertiary-fixed": "#e9e6f7",
                      "surface-variant": "#e1e3dd",
                      "on-primary-fixed-variant": "#5c5b5b",
                      "surface-container-high": "#e8e9e3",
                      "primary-container": "#e5e2e1",
                      "primary-fixed-dim": "#d6d4d3",
                      "outline": "#797b76",
                      "tertiary": "#5f5e6c",
                      "surface-tint": "#605f5f",
                      "on-secondary-fixed-variant": "#4f5f58",
                      "tertiary-dim": "#53525f",
                      "primary-fixed": "#e5e2e1",
                      "error-container": "#fa746f",
                      "secondary": "#52635c",
                      "on-error": "#fff7f6",
                      "on-primary": "#fbf8f8",
                      "on-secondary-fixed": "#33433c",
                      "error": "#a83836",
                      "primary-dim": "#545353",
                      "surface-container": "#eeeee9",
                      "surface-container-lowest": "#ffffff",
                      "on-tertiary-container": "#555461",
                      "inverse-surface": "#0d0f0d"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": [
                              "Plus Jakarta Sans"
                      ],
                      "body": [
                              "Plus Jakarta Sans"
                      ],
                      "label": [
                              "Plus Jakarta Sans"
                      ]
              }
            }
          }
        }
      </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
      </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- Top Navigation (Contextual departure, hiding shell tabs) -->
<header class="flex items-center w-full px-8 py-10 max-w-screen-2xl mx-auto">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-lowest hover:bg-surface-container-high transition-colors mr-6">
<span class="material-symbols-outlined text-on-surface" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline font-extrabold tracking-tighter text-5xl text-on-surface leading-[1.1]">Approval Analytics</h1>
</header>
<main class="max-w-screen-2xl mx-auto px-8 grid grid-cols-1 lg:grid-cols-12 gap-8 mt-4">
<!-- Left Column / Main Content -->
<div class="lg:col-span-8 flex flex-col gap-8">
<!-- Bottleneck Card (Dusty Pink equivalent / Error Container approach for high visibility but styled softly) -->
<section class="bg-[#F8E4E4] rounded-xl p-8 lg:p-12 flex flex-col md:flex-row md:items-end justify-between gap-8">
<div class="flex flex-col gap-2 max-w-lg">
<span class="font-label text-sm font-medium text-error uppercase tracking-widest">Biggest delay</span>
<h2 class="font-headline font-extrabold text-4xl lg:text-[3.5rem] leading-[1.1] text-on-surface mt-2 mb-4">Stucco Stage</h2>
<p class="font-body text-base text-on-surface-variant">3.2 days average · 6 requests waiting</p>
</div>
<button class="bg-[#1A1A1A] text-white rounded-full px-8 py-4 font-label font-semibold flex items-center gap-3 hover:scale-[1.02] active:scale-95 transition-transform shrink-0 shadow-[0_20px_40px_rgba(26,26,26,0.2)]">
                    Send Nudge
                    <span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</section>
<!-- Bar Chart Card -->
<section class="bg-surface-container-lowest rounded-xl p-8 lg:p-12">
<h3 class="font-headline font-semibold text-xl text-on-surface mb-8">Avg delay per stage (days)</h3>
<div class="flex flex-col gap-6">
<!-- Bar 1 -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center w-full">
<span class="font-label text-sm font-medium text-on-surface-variant">Head of Dept</span>
<span class="font-label text-sm font-bold text-on-surface">0.5</span>
</div>
<div class="w-full bg-surface h-12 rounded-full overflow-hidden flex items-center">
<div class="h-full bg-secondary-container rounded-full" style="width: 15%"></div>
</div>
</div>
<!-- Bar 2 (Highlighted) -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center w-full">
<span class="font-label text-sm font-medium text-on-surface-variant">Stucco Review</span>
<span class="font-label text-sm font-bold text-error">3.2</span>
</div>
<div class="w-full bg-surface h-12 rounded-full overflow-hidden flex items-center">
<div class="h-full bg-[#F8E4E4] rounded-full" style="width: 85%"></div>
</div>
</div>
<!-- Bar 3 -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center w-full">
<span class="font-label text-sm font-medium text-on-surface-variant">Dean Approval</span>
<span class="font-label text-sm font-bold text-on-surface">1.1</span>
</div>
<div class="w-full bg-surface h-12 rounded-full overflow-hidden flex items-center">
<div class="h-full bg-tertiary-container rounded-full" style="width: 35%"></div>
</div>
</div>
</div>
</section>
</div>
<!-- Right Column / Stage Table -->
<div class="lg:col-span-4 flex flex-col gap-8">
<section class="bg-surface-container-lowest rounded-xl p-8 h-full">
<h3 class="font-headline font-semibold text-xl text-on-surface mb-8">Stage Breakdown</h3>
<div class="flex flex-col gap-6">
<!-- Row 1 -->
<div class="flex items-center justify-between pb-6">
<div class="flex flex-col gap-1">
<span class="font-headline font-bold text-lg text-on-surface">Head of Dept</span>
<span class="font-label text-xs text-on-surface-variant">Avg: 0.5 days</span>
</div>
<span class="bg-secondary-container text-on-secondary-container px-4 py-2 rounded-full font-label text-xs font-bold">On track</span>
</div>
<!-- Row 2 -->
<div class="flex items-center justify-between pb-6">
<div class="flex flex-col gap-1">
<span class="font-headline font-bold text-lg text-on-surface">Stucco</span>
<span class="font-label text-xs text-on-surface-variant">Avg: 3.2 days</span>
</div>
<span class="bg-[#F8E4E4] text-error px-4 py-2 rounded-full font-label text-xs font-bold">Bottleneck</span>
</div>
<!-- Row 3 -->
<div class="flex items-center justify-between">
<div class="flex flex-col gap-1">
<span class="font-headline font-bold text-lg text-on-surface">Dean</span>
<span class="font-label text-xs text-on-surface-variant">Avg: 1.1 days</span>
</div>
<span class="bg-secondary-container text-on-secondary-container px-4 py-2 rounded-full font-label text-xs font-bold">On track</span>
</div>
</div>
</section>
</div>
</main>
</body></html>
