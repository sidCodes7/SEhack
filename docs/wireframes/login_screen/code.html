<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface min-h-screen flex items-center justify-center p-4 relative overflow-hidden font-body text-on-surface">
<!-- Decorative Sage Green Blob -->
<div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-secondary-container rounded-full blur-[80px] opacity-60 z-0"></div>
<!-- Main Content Card -->
<main class="bg-surface-container-lowest w-full max-w-md rounded-xl p-8 relative z-10 shadow-[0_20px_40px_rgba(26,26,26,0.05)] flex flex-col min-h-[618px]">
<div class="flex-grow flex flex-col justify-center gap-12">
<!-- Header Section -->
<header class="space-y-4">
<p class="text-on-surface-variant text-sm font-medium tracking-wide">Aether Institution</p>
<h1 class="font-headline text-[2.5rem] font-extrabold leading-[1.1] text-on-surface">Welcome<br/>back.</h1>
</header>
<!-- Login Form -->
<form class="space-y-8">
<div class="space-y-6">
<!-- Email Input -->
<div class="relative">
<label class="block text-xs font-medium text-on-surface-variant mb-2" for="email">Email Address</label>
<input class="w-full bg-surface-container-low border-none border-b-2 border-outline-variant/20 focus:border-primary focus:ring-0 rounded-lg px-4 py-3 text-on-surface placeholder:text-on-surface-variant/50 transition-colors" id="email" placeholder="hello@example.com" type="email"/>
</div>
<!-- Password Input -->
<div class="relative">
<label class="block text-xs font-medium text-on-surface-variant mb-2" for="password">Password</label>
<input class="w-full bg-surface-container-low border-none border-b-2 border-outline-variant/20 focus:border-primary focus:ring-0 rounded-lg px-4 py-3 text-on-surface placeholder:text-on-surface-variant/50 transition-colors" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col items-end gap-8 pt-4">
<button class="w-16 h-16 bg-[#1A1A1A] rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-transform duration-300 shadow-[0_10px_30px_rgba(26,26,26,0.2)]" type="submit">
<span class="material-symbols-outlined text-[#FFFFFF] text-3xl" data-icon="arrow_forward">arrow_forward</span>
</button>
<a class="w-full text-center text-sm text-on-surface-variant font-medium hover:text-on-surface transition-colors mt-8" href="#">
                        Forgot password?
                    </a>
</div>
</form>
</div>
</main>
