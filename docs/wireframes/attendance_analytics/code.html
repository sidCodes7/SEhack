<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Attendance Analytics - Aether</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#f4f4ef",
                        "on-tertiary-fixed": "#42424f",
                        "on-tertiary-fixed-variant": "#5f5e6c",
                        "secondary-fixed": "#d5e7de",
                        "on-secondary-container": "#45554f",
                        "secondary-fixed-dim": "#c7d9d0",
                        "secondary-dim": "#465750",
                        "surface-bright": "#faf9f5",
                        "on-secondary": "#ebfdf4",
                        "on-error-container": "#6e0a12",
                        "on-tertiary": "#fbf7ff",
                        "surface": "#faf9f5",
                        "tertiary-container": "#e9e6f7",
                        "on-primary-container": "#525151",
                        "outline-variant": "#b0b3ad",
                        "background": "#faf9f5",
                        "error-dim": "#67040d",
                        "on-surface-variant": "#5d605b",
                        "inverse-on-surface": "#9d9d9a",
                        "primary": "#605f5f",
                        "surface-dim": "#d9dbd4",
                        "tertiary-fixed-dim": "#dbd8e9",
                        "secondary-container": "#d5e7de",
                        "surface-container-highest": "#e1e3dd",
                        "on-background": "#30332f",
                        "on-surface": "#30332f",
                        "inverse-primary": "#ffffff",
                        "on-primary-fixed": "#403f3f",
                        "tertiary-fixed": "#e9e6f7",
                        "surface-variant": "#e1e3dd",
                        "on-primary-fixed-variant": "#5c5b5b",
                        "surface-container-high": "#e8e9e3",
                        "primary-container": "#e5e2e1",
                        "primary-fixed-dim": "#d6d4d3",
                        "outline": "#797b76",
                        "tertiary": "#5f5e6c",
                        "surface-tint": "#605f5f",
                        "on-secondary-fixed-variant": "#4f5f58",
                        "tertiary-dim": "#53525f",
                        "primary-fixed": "#e5e2e1",
                        "error-container": "#fa746f",
                        "secondary": "#52635c",
                        "on-error": "#fff7f6",
                        "on-primary": "#fbf8f8",
                        "on-secondary-fixed": "#33433c",
                        "error": "#a83836",
                        "primary-dim": "#545353",
                        "surface-container": "#eeeee9",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#555461",
                        "inverse-surface": "#0d0f0d"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#F7F6F2] text-[#1A1A1A] min-h-screen pb-32">
<!-- Top Navigation (Shell suppressed for this deep-dive screen, simplified header used) -->
<header class="px-8 py-10 max-w-screen-xl mx-auto flex items-center gap-6">
<button class="w-12 h-12 rounded-full bg-surface-container-lowest flex items-center justify-center hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[#1A1A1A]">arrow_back</span>
</button>
<div>
<h1 class="text-[2.0rem] font-bold leading-[1.2] text-[#1A1A1A]">Attendance Analytics</h1>
<p class="text-[1.0rem] font-medium text-[#6B6B6B] mt-2">Campus Overview</p>
</div>
</header>
<main class="max-w-screen-xl mx-auto px-8 grid grid-cols-1 lg:grid-cols-12 gap-12">
<!-- Left Column: Chart -->
<section class="lg:col-span-8 flex flex-col gap-12">
<div class="bg-[#FFFFFF] rounded-[32px] p-8 lg:p-12">
<div class="mb-12">
<h2 class="text-[1.125rem] font-semibold text-[#1A1A1A] mb-2">Department trend — this month</h2>
<p class="text-[0.875rem] text-[#6B6B6B]">Tracking average attendance across major faculties.</p>
</div>
<!-- Abstracted Line Chart -->
<div class="relative h-64 w-full flex items-end justify-between border-b border-outline-variant/10 pb-4">
<!-- Y Axis Labels -->
<div class="absolute left-0 top-0 bottom-8 flex flex-col justify-between text-[#6B6B6B] text-[0.75rem] font-medium opacity-50">
<span>100%</span>
<span>85%</span>
<span>70%</span>
</div>
<!-- Chart Lines (Simulated with SVG for clarity in this layout style) -->
<svg class="absolute inset-0 h-full w-full px-8 pb-4" preserveaspectratio="none" viewbox="0 0 100 100">
<!-- Sage Green (CSE) -->
<path d="M 0,40 Q 25,30 50,45 T 100,20" fill="none" stroke="#D8EAE1" stroke-linecap="round" stroke-width="4"></path>
<!-- Lavender (ECE) -->
<path d="M 0,60 Q 25,50 50,55 T 100,40" fill="none" stroke="#EAE7F8" stroke-linecap="round" stroke-width="4"></path>
<!-- Gold (Mech) -->
<path d="M 0,30 Q 25,10 50,25 T 100,10" fill="none" stroke="#D4A843" stroke-linecap="round" stroke-width="4"></path>
</svg>
<!-- X Axis Labels -->
<div class="w-full flex justify-between px-8 text-[#6B6B6B] text-[0.75rem] font-medium mt-auto">
<span>W1</span>
<span>W2</span>
<span>W3</span>
<span>W4</span>
</div>
</div>
<!-- Legend -->
<div class="mt-8 flex flex-wrap gap-6">
<div class="flex items-center gap-3">
<div class="w-4 h-4 rounded-full bg-[#D8EAE1]"></div>
<span class="text-[0.875rem] font-medium text-[#1A1A1A]">CSE</span>
</div>
<div class="flex items-center gap-3">
<div class="w-4 h-4 rounded-full bg-[#EAE7F8]"></div>
<span class="text-[0.875rem] font-medium text-[#1A1A1A]">ECE</span>
</div>
<div class="flex items-center gap-3">
<div class="w-4 h-4 rounded-full bg-[#D4A843]"></div>
<span class="text-[0.875rem] font-medium text-[#1A1A1A]">Mech</span>
</div>
</div>
</div>
</section>
<!-- Right Column: At Risk -->
<aside class="lg:col-span-4 flex flex-col gap-6">
<!-- Dusty Pink Header Card -->
<div class="bg-[#F8E4E4] rounded-[32px] p-8">
<div class="flex items-center justify-between mb-4">
<span class="text-[0.875rem] font-bold uppercase tracking-widest text-[#a83836]">Below 75% threshold</span>
<span class="material-symbols-outlined text-[#a83836]" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<h3 class="text-[3.5rem] font-extrabold leading-[1.1] text-[#1A1A1A] tracking-tighter">3 Sections</h3>
</div>
<!-- List -->
<div class="flex flex-col gap-4">
<!-- Item 1 -->
<div class="bg-[#FFFFFF] rounded-[24px] p-6 flex items-center justify-between">
<div>
<h4 class="text-[1.125rem] font-semibold text-[#1A1A1A]">CSE Sem 3 B</h4>
<p class="text-[0.875rem] text-[#6B6B6B] mt-1">Average: <span class="font-bold text-[#a83836]">68%</span></p>
</div>
<button class="bg-[#1A1A1A] text-[#FFFFFF] px-6 py-3 rounded-full text-[0.875rem] font-bold hover:bg-[#1A1A1A]/90 transition-colors">
                        Notify
                    </button>
</div>
<!-- Item 2 -->
<div class="bg-[#FFFFFF] rounded-[24px] p-6 flex items-center justify-between">
<div>
<h4 class="text-[1.125rem] font-semibold text-[#1A1A1A]">ECE Sem 5 A</h4>
<p class="text-[0.875rem] text-[#6B6B6B] mt-1">Average: <span class="font-bold text-[#D4A843]">71%</span></p>
</div>
<button class="bg-[#1A1A1A] text-[#FFFFFF] px-6 py-3 rounded-full text-[0.875rem] font-bold hover:bg-[#1A1A1A]/90 transition-colors">
                        Notify
                    </button>
</div>
<!-- Item 3 -->
<div class="bg-[#FFFFFF] rounded-[24px] p-6 flex items-center justify-between">
<div>
<h4 class="text-[1.125rem] font-semibold text-[#1A1A1A]">Mech Sem 1 C</h4>
<p class="text-[0.875rem] text-[#6B6B6B] mt-1">Average: <span class="font-bold text-[#D4A843]">74%</span></p>
</div>
<button class="bg-[#1A1A1A] text-[#FFFFFF] px-6 py-3 rounded-full text-[0.875rem] font-bold hover:bg-[#1A1A1A]/90 transition-colors">
                        Notify
                    </button>
</div>
</div>
</aside>
</main>
</body></html>
