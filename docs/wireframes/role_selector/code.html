<style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>

    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface text-on-surface min-h-screen flex flex-col relative pb-24">
<!-- Main Content -->
<main class="flex-grow flex flex-col px-6 pt-12 pb-24">
<!-- Header -->
<header class="mb-10">
<h1 class="text-[3.5rem] font-extrabold leading-[1.1] text-on-surface tracking-tight w-3/4">
        I am a...
      </h1>
</header>
<!-- Role Cards -->
<div class="flex flex-col gap-4 flex-grow">
<!-- Card 1: Student -->
<button class="w-full text-left bg-tertiary-container rounded-xl p-6 flex justify-between items-start transition-transform active:scale-[0.98]">
<div>
<h2 class="text-2xl font-bold text-on-surface mb-1">Student</h2>
<p class="text-on-surface-variant text-sm font-medium">Priyank</p>
</div>
<div class="bg-white/50 p-3 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface" data-icon="school">school</span>
</div>
</button>
<!-- Card 2: Professor (Selected) -->
<button class="w-full text-left bg-[#F5F0D0] rounded-xl p-6 flex justify-between items-start border-2 border-on-surface shadow-[0_8px_30px_rgb(26,26,26,0.12)] transition-transform active:scale-[0.98]">
<div>
<h2 class="text-2xl font-bold text-on-surface mb-1">Professor</h2>
<p class="text-on-surface-variant text-sm font-medium">Harshav</p>
</div>
<div class="bg-white/50 p-3 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface" data-icon="menu_book">menu_book</span>
</div>
</button>
<!-- Card 3: Admin / Dean -->
<button class="w-full text-left bg-secondary-container rounded-xl p-6 flex justify-between items-start transition-transform active:scale-[0.98]">
<div>
<h2 class="text-2xl font-bold text-on-surface mb-1">Admin / Dean</h2>
<p class="text-on-surface-variant text-sm font-medium">Staff Portal</p>
</div>
<div class="bg-white/50 p-3 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface" data-icon="domain">domain</span>
</div>
</button>
</div>
<!-- Bottom Action Area -->
<div class="mt-8 flex justify-end">
<button class="w-16 h-16 bg-on-surface text-surface-container-lowest rounded-full flex items-center justify-center shadow-[0_10px_40px_rgba(26,26,26,0.2)] hover:scale-105 transition-transform active:scale-95">
<span class="material-symbols-outlined text-3xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
<!-- BottomNavBar Component -->
<!-- Navigation intent: User is selecting a role, this is a transactional/onboarding flow. Navigation shell suppressed per the "Shell Visibility & Relevance" rule. -->
